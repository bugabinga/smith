<!doctype html>
<!--
  Source for docs/assets/social-preview.png — the repository's GitHub social
  preview card, rendered at the GitHub-recommended 1280x640 with headless
  Chromium at device-scale 1. Palette: Catppuccin Mocha (the spec's default
  theme example). The window is inset 72px/48px so all content clears the 40px
  safe border social platforms may crop. Design asset, not part of the build.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --base:    #1e1e2e;
    --text:    #cdd6f4;
    --subtext: #a6adc8;
    --overlay: #6c7086;
    --surface: #313244;
    --mauve:   #cba6f7;
    --blue:    #89b4fa;
    --green:   #a6e3a1;
    --peach:   #fab387;
    --red:     #f38ba8;
    --yellow:  #f9e2af;
    --teal:    #94e2d5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    position: relative;
    font-family: "DejaVu Sans Mono", "Liberation Mono", monospace;
    background:
      radial-gradient(1100px 720px at 80% -14%, rgba(203,166,247,0.16), transparent 60%),
      radial-gradient(900px 620px at 6% 118%, rgba(137,180,250,0.13), transparent 60%),
      #11111b;
    -webkit-font-smoothing: antialiased;
  }

  /* Terminal window mock — inset well inside the 40px safe border */
  .window {
    position: absolute;
    top: 48px; left: 72px;
    width: 1136px; height: 544px;   /* bottom edge at y=592 */
    background: linear-gradient(180deg, #24243a 0%, var(--base) 24%);
    border: 1px solid #3a3a52;
    border-radius: 16px;
    box-shadow: 0 34px 90px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
  }

  .titlebar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 22px;
    background: rgba(17,17,27,0.5);
    border-bottom: 1px solid #2a2a3d;
    gap: 9px;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .dot.r { background: var(--red); }
  .dot.y { background: var(--yellow); }
  .dot.g { background: var(--green); }
  .titlebar .path {
    margin-left: 16px;
    color: var(--overlay);
    font-size: 16px;
  }

  /* Hero fills the space between title bar and status bar */
  .hero {
    position: absolute;
    top: 48px; bottom: 48px; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 54px;
  }

  .wordmark { display: flex; align-items: baseline; }
  .wordmark .name {
    font-size: 110px;
    font-weight: bold;
    line-height: 0.9;
    letter-spacing: -2px;
    background: linear-gradient(92deg, var(--mauve) 0%, var(--blue) 56%, var(--teal) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .caret {
    display: inline-block;
    width: 24px; height: 84px;
    background: var(--peach);
    margin-left: 12px;
    border-radius: 3px;
    box-shadow: 0 0 26px rgba(250,179,135,0.5);
  }

  .tagline {
    margin-top: 30px;
    font-size: 30px;
    color: var(--text);
  }
  .tagline .accent { color: var(--peach); }

  .features {
    margin-top: 26px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 19px;
    color: var(--subtext);
    background: rgba(49,50,68,0.5);
    border: 1px solid #3a3a52;
    border-radius: 999px;
    padding: 9px 18px;
  }
  .chip b { color: var(--text); font-weight: bold; }

  /* Status bar — the spec's status bar shows model, context %, cost */
  .statusbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(17,17,27,0.85);
    border-top: 1px solid #2a2a3d;
    display: flex;
    align-items: center;
    padding: 0 28px;
    font-size: 17px;
    color: var(--subtext);
    gap: 24px;
  }
  .statusbar .seg { display: flex; align-items: center; gap: 10px; }
  .statusbar .sep { color: #3a3a52; }
  .statusbar .ok { color: var(--green); }
  .statusbar .blue { color: var(--blue); }
  .statusbar .peach { color: var(--peach); }
  .statusbar .spacer { flex: 1; }
  .bar { display: inline-block; width: 96px; height: 8px; border-radius: 4px;
         background: var(--surface); overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 37%;
             background: linear-gradient(90deg, var(--blue), var(--teal)); }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="path">smith — ~/project</span>
    </div>

    <div class="hero">
      <div class="wordmark">
        <span class="name">smith</span>
        <span class="caret"></span>
      </div>
      <div class="tagline">A fast, extensible AI coding agent <span class="accent">for your terminal.</span></div>
      <div class="features">
        <span class="chip"><b>Rust</b> TUI</span>
        <span class="chip">Provider-independent <b>agent loop</b></span>
        <span class="chip">Sandboxed <b>Lua plugins</b></span>
        <span class="chip">Deterministic <b>replay</b></span>
      </div>
    </div>

    <div class="statusbar">
      <span class="seg"><span class="blue">▲</span> smith</span>
      <span class="sep">·</span>
      <span class="seg">ctx <span class="bar"><i></i></span> 37%</span>
      <span class="sep">·</span>
      <span class="seg">cost <span class="peach">$0.12</span></span>
      <span class="spacer"></span>
      <span class="seg"><span class="ok">●</span> ready</span>
    </div>
  </div>
</body>
</html>
