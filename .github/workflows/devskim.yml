# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: DevSkim

# Incremental scans run only when source code changes — a docs/config/markdown
# PR has nothing for a code security scanner to find. The weekly schedule is the
# full-tree backstop, so nothing a path filter skips stays permanently unscanned.
# (Safe because DevSkim is not a required merge check; only `merge-gate` is.)
on:
  push:
    branches: [ "main" ]
    # Extension list is intentionally ahead of the code: it covers everything
    # smith will hold — Rust (product), Lua (plugins), JS/TS/Astro (site), shell.
    # None but prototypes exist yet; a positive match on a future extension is a
    # no-op until that source lands. (2026-07-22.)
    paths: &code
      - '**/*.rs'
      - '**/*.lua'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.astro'
      - '**/*.sh'
      - '!prototypes/**'          # disposable (SPEC §18); also ignore-globbed below — don't even trigger
  pull_request:
    branches: [ "main" ]
    paths: *code
  schedule:
    - cron: '29 9 * * 5'

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # Keep the action's defaults (`**/.git/**,**/bin/**`) and add
          # prototypes/: disposable spec-validation code (SPEC §18). CodeQL
          # already excludes it via paths-ignore; without this the Security tab
          # fills with findings from the ~75 committed throwaway sources. target/
          # is gitignored (never checked out) but listed defensively.
          ignore-globs: "**/.git/**,**/bin/**,**/target/**,**/prototypes/**"

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif
