# p35 — ADW harness test. Disposable prototype (SPEC §18). Push-triggered on the
# working branch and path-scoped, so it runs only when p35 changes and needs no
# presence on main. Proves the App token + claude-code-action + subagent + model
# override actually work, and pins down the action's real input syntax. Delete
# once folded into the real ADW workflows.
name: p35-adw-harness

on:
  push:
    branches: ["claude/retier-agents"]   # this branch only — a secrets-bearing §18 probe, kept narrow
    paths:
      - ".github/workflows/p35-adw-harness.yml"
      - "prototypes/p35-adw-harness/**"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: p35-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: mint the bot token
        id: token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: token outcome
        run: |
          echo "create-github-app-token outcome = ${{ steps.token.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "token minted: ${{ steps.token.outputs.token != '' }}" >> "$GITHUB_STEP_SUMMARY"

      # Finding (run 1): claude-code-action@v1 rejects `push` — it only handles
      # issue/PR/comment events. So push/schedule/tag-triggered agents (planner,
      # sweeper, docs-writer, release-manager) need the event-agnostic CLI runner
      # instead. Probe it here.
      - name: install claude code CLI
        run: npm install -g @anthropic-ai/claude-code && claude --version

      # Verifies BOTH that the CLI launches AND that `--effort` is accepted — the
      # flag the retiering puts on all 8 Anthropic agents. If the flag were
      # rejected, claude would error, the grep would miss, and this step reddens
      # (the fleet-outage the reviewer warned about, caught here before merge).
      - name: run headless with --effort (event-agnostic runner)
        id: cli
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -o pipefail
          fail=0
          # Cover the model/effort combos the fleet actually uses: opus at high and
          # xhigh, fable at xhigh. A rejected flag or bad model reddens the run.
          for combo in "claude-opus-4-8 high" "claude-opus-4-8 xhigh" "claude-fable-5 xhigh"; do
            set -- $combo
            echo "== probing --model $1 --effort $2 =="
            if claude -p "Reply with exactly this line and nothing else: ADW-HARNESS-OK" \
                 --model "$1" --effort "$2" --output-format text 2>&1 | tee out.txt \
               && grep -q "ADW-HARNESS-OK" out.txt; then
              echo "ok: $1 $2"
            else
              echo "FAIL: $1 $2"; fail=1
            fi
          done
          [ "$fail" = 0 ] && echo "CLI_RUNNER=ok (all model/effort combos accepted)" || { echo "CLI_RUNNER=fail"; exit 1; }

      - name: cli outcome
        run: |
          echo "headless CLI runner outcome = ${{ steps.cli.outcome }}" >> "$GITHUB_STEP_SUMMARY"
