# Codex cross-family review — a second opinion from a different model family,
# advisory (never a gate label; a Codex outage can't wedge a merge).
#
# Runs autonomously on every non-draft PR. The repo is public and forkable, so
# the enforced control is GitHub fork-secret isolation: this triggers on
# `pull_request` (never `pull_request_target`), so a fork PR gets an empty
# CODEX_AUTH_JSON and a read-only token — the credentialed path cannot run on
# untrusted fork code. That control is permanent; no author gate is needed. See
# AGENTIC-DEVELOPMENT.md "Credentialed agents over untrusted input" for the
# same-repo residual (attacker-authored issue → adw-codex-build) — accepted and
# ungated, symmetric with Claude's builder, not closed by a per-workflow gate.
#
# Codex runs with full access (`--sandbox danger-full-access`), same as every
# Claude agent's `--dangerously-skip-permissions` — bounded by its charter, not a
# cage. The real control is credential isolation: `codex exec` never sees a GitHub
# token (the diff is fetched and the comment posted in separate token-holding
# steps), so a prompt-injected review has no GitHub credential to abuse. Codex
# loads its repo rules from `CLAUDE.md` via `project_doc_fallback_filenames` — the
# same file every Claude agent reads.
name: adw-codex-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adw-codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Codex auth + config
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          # No AGENTS.md in the repo — Codex loads CLAUDE.md as its project doc.
          printf 'project_doc_fallback_filenames = ["CLAUDE.md"]\n' > ~/.codex/config.toml
      - run: npm install -g @openai/codex
      - name: Fetch the diff (holds the token; Codex does not)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr diff "$PR" --repo "$REPO" | head -c 100000 > pr.diff
      - name: Review (advisory, fail-open — no GitHub token in this step)
        continue-on-error: true
        run: |
          codex exec --sandbox danger-full-access "Cross-family review of this PR diff. Your repo rules load automatically from the project instructions. Be terse: real, file-anchored findings only, most severe first, one line each. No preamble, no praise, no restating the diff. If nothing material, reply exactly 'No blocking findings.' Diff:
          $(cat pr.diff)" > review.md 2> codex.err || true
          # codex prints its banner/progress to stderr; keep it out of the comment.
          grep -q '[^[:space:]]' review.md || echo "_Codex unavailable (advisory)._" > review.md
          { echo "🔎 **Codex** (advisory cross-family review)"; echo;
            sed -E 's#(gh[pousr]_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9_-]{20,}|eyJ[A-Za-z0-9._-]{20,})#***#g' review.md; } > c.md
      - name: Post the review as the App
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body-file c.md || true
          gh pr edit "$PR" --repo "$REPO" --add-label codex-reviewed || true
