# ADW Codex review — the cross-family reviewer, first-class. Codex (OpenAI) runs
# on the owner's ChatGPT subscription and posts an independent review with
# different blind spots than the Anthropic agents. It is deliberately ADVISORY:
# it posts a comment and a `codex-reviewed` label, but it does NOT own a
# merge-gate label — an external service must never be able to deadlock a merge.
# Every step is fail-open for the same reason.
#
# Auth refreshes itself in CI: the rotated auth.json is saved to a rolling cache
# each run and restored next run, so it stays alive as long as CI keeps using it
# (proven mechanics: p37). The CODEX_AUTH_JSON secret is the cold-start seed.
#
# Injection posture (a credentialed agent reads the untrusted PR diff and its
# output is published): the codex-exec step runs with NO GitHub token in its env
# and a read-only sandbox, and its output is token-redacted before posting — so a
# prompt-injected diff cannot make Codex echo a live credential into a public
# comment. Fetching the diff and posting the comment (which need the token) are
# separate steps.
name: adw-codex-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adw-codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex:
    # first-class but frugal: skip drafts and Dependabot (dependency-manager owns
    # those). The shared 5-hour window is protected by this filter; tighten to a
    # `codex-review` label if p37's per-review cost turns out high.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      # Redact anything token-shaped before it reaches a public comment or the run
      # log — defense in depth for the credential this job holds. Covers GitHub
      # tokens/PATs, OpenAI keys, and JWT/OAuth access tokens (auth.json's).
      REDACT: 's#(gh[pousr]_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9_-]{20,}|eyJ[A-Za-z0-9._-]{20,})#***REDACTED***#g'
    steps:
      - uses: actions/checkout@v4

      # Restore the rolling, self-refreshing auth; seed from the secret if cold.
      - name: Restore Codex auth (rolling cache)
        uses: actions/cache/restore@v4
        with:
          path: ~/.codex/auth.json
          # Branch-scoped by convention. (Actions cache is already isolated per
          # ref — one PR can't restore another PR branch's cache — so this is not
          # what prevents cross-PR races. The race that remains, untouched here:
          # two fresh PR branches both cold-seed the same CODEX_AUTH_JSON and both
          # rotate that one refresh token. Acceptable: the secret is the seed and
          # re-seeding is cheap.)
          key: codex-auth-${{ github.head_ref }}-${{ github.run_id }}
          restore-keys: |
            codex-auth-${{ github.head_ref }}-
      - name: Prepare Codex auth (seed only if cache cold)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          export CODEX_HOME="$HOME/.codex"
          mkdir -p "$CODEX_HOME"; chmod 700 "$CODEX_HOME"
          # Seed ONLY if missing — overwriting the restored file discards the
          # tokens Codex rotated last run (OpenAI CI guidance), breaking refresh.
          if [ -s "$CODEX_HOME/auth.json" ]; then
            echo "auth.json restored from cache"
          else
            printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
            echo "auth.json seeded from CODEX_AUTH_JSON secret"
          fi
          # Keep the credential private (0600), matching OpenAI's CI example.
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Install Codex
        # NOTE: unpinned — this binary holds the credential, so pin to a vetted
        # version once one is chosen (tracked as hardening; advisory workflow).
        run: npm install -g @openai/codex

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr diff "$PR" --repo "$REPO" > pr.diff

      - name: Codex review (fail-open; no GH token in env; read-only sandbox)
        id: review
        continue-on-error: true
        run: |
          set +e
          export CODEX_HOME="$HOME/.codex"
          # No --json: codex prints ONLY the final message to stdout (progress →
          # stderr), so stdout IS the review — no fragile JSONL scrape (the old
          # jq program was a compile error, so the fallback fired every run).
          # --sandbox read-only (codex's default, pinned explicitly): the model's
          # shell cannot write, nor reach the credential in $HOME outside the
          # workspace. No GH_TOKEN in this env — see the header's injection note.
          codex exec --sandbox read-only "You are smith's cross-family reviewer (read AGENTS.md). Give an independent, file-anchored review of this pull request diff — correctness, security (untrusted Lua plugins, secrets, injection), and fit against docs/SPEC.md — flagging what a same-family reviewer might rationalize away. Concise markdown. Diff follows:
          $(cat pr.diff)" > review.md 2> codex.err
          rc=$?; echo "codex exit=$rc"
          if ! grep -q '[^[:space:]]' review.md; then
            # Surface WHY (redacted), so "unavailable" is never a black box.
            echo "::group::codex stderr (diagnostic, redacted)"
            tail -40 codex.err 2>/dev/null | sed -E "$REDACT" || true
            echo "::endgroup::"
            echo "_Codex was unavailable for this review (auth/window/tooling — advisory, non-blocking). See the run log._" > review.md
          fi

      - name: Post Codex review (token-redacted)
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          [ -f review.md ] || echo "_Codex review did not run._" > review.md
          {
            echo "🔎 **Codex cross-family review** (advisory — the Fable reviewers own the gate)"
            echo
            sed -E "$REDACT" review.md
          } > comment.md
          gh pr comment "$PR" --repo "$REPO" --body-file comment.md || true

      - name: Report window cost (redacted, best-effort)
        continue-on-error: true
        run: |
          echo "### codex model / token / window usage (if reported)"
          grep -iE 'token|rate.?limit|usage|remaining|[0-9]+%' codex.err 2>/dev/null \
            | sed -E "$REDACT" | tail -8 || echo "n/a"

      # Persist the freshly-rotated auth for the next run — this is what keeps it
      # alive without weekly re-seeding.
      - name: Save refreshed Codex auth (rolling cache)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.codex/auth.json
          key: codex-auth-${{ github.head_ref }}-${{ github.run_id }}

      - name: Mark codex-reviewed (fail-open, never gates)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR" --repo "$REPO" --add-label codex-reviewed || true
