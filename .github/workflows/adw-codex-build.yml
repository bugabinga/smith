# Codex as a first-class BUILDER — not just a reviewer. Route an issue to Codex
# by adding the `codex` label; it implements the slice on a branch and opens a PR
# that rides the normal gate (Opus review + merge-gate), exactly like a
# builder-authored PR. Mix-and-match: the triager routes each issue to Claude's
# builder or Codex.
#
# Trust: the triager auto-applies `codex` on issues anyone can open, so this is
# NOT human-gated — the same shape as Claude's builder on `ready`. Attacker issue
# text can reach this credentialed build; that residual is accepted symmetrically
# across both builders (see AGENTIC-DEVELOPMENT.md "Credentialed agents over
# untrusted input"), not closed by a per-workflow author gate.
#
# Codex runs at full access (`--sandbox danger-full-access`) like every Claude
# agent, but never in the same step as the App token: the checkout persists no
# credential, the issue body is fetched to a file in a token-holding step, and the
# commit/push/PR runs in another — so a prompt-injected issue body has no GitHub
# credential to abuse. (The on-disk Codex `auth.json` remains reachable under full
# access — the accepted residual, symmetric with Claude's builder.)
name: adw-codex-build

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: adw-codex-build-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.label.name == 'codex'
    runs-on: ubuntu-latest
    steps:
      - id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Codex auth + config
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          # No AGENTS.md in the repo — Codex loads CLAUDE.md as its project doc.
          printf 'project_doc_fallback_filenames = ["CLAUDE.md"]\n' > ~/.codex/config.toml
      - run: npm install -g @openai/codex
      - name: Fetch the issue body (holds the token; Codex does not)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue view "$ISSUE" --repo "$REPO" --json body -q .body > issue-body.txt
          git checkout -b "codex/issue-${ISSUE}"
      - name: Build the slice (full access, NO GitHub token in this step)
        env:
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Full access, same as every Claude agent — bounded by charter, not a
          # cage. No GitHub credential is present here: persist-credentials is
          # false and GH_TOKEN is unset, so a prompt-injected issue body has no
          # GitHub token to abuse. Terse — it's building, not narrating.
          codex exec --sandbox danger-full-access "Implement issue #${ISSUE} of ${REPO}. Your repo rules load automatically from the project instructions; read docs/SPEC.md; build ONE focused, tested slice per the walking-skeleton discipline; no unrequested extras. Do not merge or edit the spec. Issue title: ${TITLE}
          Issue body:
          $(cat issue-body.txt)" 2>&1 | tail -30 || true
      - name: Commit, push, and open the PR (holds the token; Codex is done)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          TITLE: ${{ github.event.issue.title }}
        run: |
          set -e
          branch="codex/issue-${ISSUE}"
          git config user.name "agent-smith-bugabinga-adc[bot]"
          git config user.email "agent-smith-bugabinga-adc[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "Codex produced no changes — needs a clearer spec anchor or is not yet buildable."
            exit 0
          fi
          git commit -m "Implement #${ISSUE}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:refs/heads/${branch}"
          gh pr create --repo "$REPO" --head "$branch" --base main \
            --title "$TITLE" \
            --body "Implements #${ISSUE}. Built by Codex (cross-family builder); rides the normal review + merge-gate." || true
