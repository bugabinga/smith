# ADW survey — surveyor advances the build on its own, without an owner filing
# an issue. On a schedule it measures the gap between the spec (the goal) and the
# code (what exists) and opens the single next work-order.
# schedule is an automation event the action serves directly (unlike push), so
# no CLI: claude-code-action in automation mode with an explicit prompt.
# Subscription auth (CLAUDE_CODE_OAUTH_TOKEN) — no metered API.
name: adw-survey

on:
  schedule:
    - cron: "0 */6 * * *"        # every six hours
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: adw-survey
  cancel-in-progress: true

jobs:
  survey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the surveyor subagent (.claude/agents/surveyor.md) on
            ${{ github.repository }}. Follow the charter exactly: check
            work-in-progress first (count BOTH the `ready` and `codex` queues, and
            open agent PRs) and stop if the front is busy; otherwise open the single
            next unbuilt work-order in walking-skeleton order, routed by surface
            (`ready` for UI/UX, `codex` for backend) — or `needs:spec` /
            `needs:prototype` if it needs a decision or proof. One issue per tick,
            or none. Never edit the spec, never write code.
          claude_args: --model claude-fable-5 --effort high --dangerously-skip-permissions
