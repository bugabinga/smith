# Docs site → GitHub Pages, built with mdBook — a Rust-native, `cargo install`-able
# generator, so it satisfies PROJECT-INVARIANTS §1 (no package.json, no Node) with
# no carve-out. Sources live under docs/book/ (Markdown, within the docs/ tree, so
# no §2 change). Replaces the Astro sample workflow.
#
# Dormant until the book is scaffolded: the guard skips the build (and the deploy)
# while docs/book/book.toml is absent, so main stays green until that work-order
# lands — unlike a hard failure.
name: docs

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.guard.outputs.present }}
    steps:
      - uses: actions/checkout@v4
      - id: guard
        run: |
          if [ -f docs/book/book.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::docs/book/book.toml absent — docs site not scaffolded yet; skipping."
          fi
      - if: steps.guard.outputs.present == 'true'
        name: Build the book
        run: |
          cargo install mdbook --locked
          mdbook build docs/book
      - if: steps.guard.outputs.present == 'true'
        uses: actions/configure-pages@v5
      - if: steps.guard.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    needs: build
    if: needs.build.outputs.present == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
