# ADW sweep — sweeper unsticks stalls and brakes runaways on a schedule.
# schedule is an automation event the action serves directly (unlike push), so
# no CLI: claude-code-action in automation mode with an explicit prompt.
# Subscription auth (CLAUDE_CODE_OAUTH_TOKEN) — no metered API.
name: adw-sweep

on:
  schedule:
    - cron: "17 * * * *"        # hourly, off the hour
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: adw-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Use the sweeper subagent (.claude/agents/sweeper.md) on
            ${{ github.repository }}. Find stalls — PRs green but unmerged, red
            with no fix, `ready` with no branch, merge-conflicted, reviews never
            posted — re-kick the tractable ones and label the rest `stalled` with
            why. Enforce WIP limits. Report a one-line board state; stay silent if
            nothing changed. Never merge, never touch code.
          claude_args: --model claude-haiku-4-5-20251001
