# ADW sweep — the sweeper unsticks stalls and brakes runaways on a schedule.
# Runs on Codex (gpt-5.6-luna, low effort — mechanical board work), authenticated
# as the App. Its charter is .claude/agents/sweeper.md, injected into the prompt.
# Subscription auth (CODEX_AUTH_JSON); re-seed when the ~8-day token lapses.
name: adw-sweep

on:
  schedule:
    - cron: "17 * * * *"        # hourly, off the hour
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: adw-sweep
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Codex auth + config
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          printf 'project_doc_fallback_filenames = ["CLAUDE.md"]\n' > ~/.codex/config.toml
      - run: npm install -g @openai/codex@0.145.0
      - name: sweeper sweeps the board
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          codex exec -m gpt-5.6-luna -c model_reasoning_effort="low" --sandbox danger-full-access "$(awk 'f>=2{print} /^---$/{f++}' .claude/agents/sweeper.md)

          You are the sweeper running headless in CI for ${REPO} (the gh CLI is configured via GH_TOKEN). Follow the charter above exactly — it defines the stalls to find and the WIP limits, and both cover the ready AND codex queues (both builders). Re-kick the tractable ones, label the rest stalled with why, hold new work when in-flight PRs are over the limit. Report a one-line board state; stay silent if nothing changed. Never merge, never touch code."
