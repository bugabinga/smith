# Routing labels as code — the ADW's control plane. Agents read and set these;
# a label-sync action applies this file so the label set is reviewable, not
# hand-tended in the GitHub UI. Colours group by axis (type / size / state / risk).
# name, color (no #), description.
#
# First sync: adw-labels only runs on a push to main touching this file, and the
# merge that introduced it didn't trigger it — so this no-op edit fires that first
# run to create the label set.

# — type (triager classifies) —
- name: "type:bug"
  color: "d1345b"
  description: "Something specced is broken"
- name: "type:task"
  color: "3f6fd1"
  description: "New work toward the spec"
- name: "type:question"
  color: "8a6fd1"
  description: "Needs clarification before it is work"

# — size (triager sizes) —
- name: "size:s"
  color: "2b2d42"
  description: "Small, a single slice"
- name: "size:m"
  color: "2b2d42"
  description: "Medium"
- name: "size:l"
  color: "2b2d42"
  description: "Large — likely needs decomposition first"

# — priority (triager ranks; planner reconciles across the backlog) —
- name: "priority:high"
  color: "d9480f"
  description: "Do this before medium/low — closest to the mission's critical path"
- name: "priority:medium"
  color: "f76707"
  description: "Normal importance — the default rank"
- name: "priority:low"
  color: "ffa94d"
  description: "Nice-to-have — yields to everything above it"
- name: "urgent"
  color: "e03131"
  description: "Time-critical (regression, security-adjacent, or blocking others) — the planner ranks it ahead of same/lower-priority work when ordering the backlog"

# — state (drives routing) —
- name: "ready"
  color: "1f9d55"
  description: "Well-formed and spec-covered — builder may pick it up"
- name: "needs:info"
  color: "c9a227"
  description: "Blocked on a specific answer from the reporter"
- name: "needs:spec"
  color: "b5179e"
  description: "Requires a spec change — owner's domain, via /smith"
- name: "needs:prototype"
  color: "e07a1f"
  description: "Spec claim unproven — route to /pioneer"
- name: "needs:security"
  color: "7a1fa2"
  description: "Force a security-reviewer review"
- name: "needs:breakdown"
  color: "d6336c"
  description: "Epic / multi-item — the planner slices it into single work-orders"

# — build routing (triager decides; owner may override) —
- name: "codex"
  color: "10a37f"
  description: "Route to the Codex builder instead of `ready` (Claude); one or the other, never both"

# — verdict (reviewers set; the merge-gate reads these) —
- name: "reviewed"
  color: "1f9d55"
  description: "reviewer cleared correctness — one half of the merge-gate"
- name: "changes-requested"
  color: "d1345b"
  description: "reviewer wants changes — wakes builder to revise; holds the gate"
- name: "security-cleared"
  color: "1f9d55"
  description: "security-reviewer found no high-severity issue — the other half"
- name: "codex-reviewed"
  color: "8a6fd1"
  description: "Codex cross-family review posted (advisory — not a gate label)"

# — risk (security-reviewer sets; gates human review) —
- name: "risk:low"
  color: "3d7a3d"
  description: "Eligible for gated auto-merge once trust is on"
- name: "risk:high"
  color: "9b1c1c"
  description: "Escalated to the owner — never auto-merges"

# — housekeeping —
- name: "pipeline-jammed"
  color: "9b1c1c"
  description: "A required check is failing across ≥2 PRs — merges are wedged; jam-detector opened this"
- name: "blocked"
  color: "b5179e"
  description: "Waiting on another issue — usually a needs:spec escalation"
- name: "duplicate"
  color: "6b7280"
  description: "Already tracked elsewhere"
- name: "stalled"
  color: "6b7280"
  description: "Sweeper flagged no progress — see the comment for why"
