[build]
rustflags = [
    # Zero warnings policy
    "-D", "warnings",

    # Core lint groups
    "-D", "clippy::all",
    "-D", "clippy::pedantic",
    "-W", "clippy::nursery",
    "-D", "clippy::suspicious",
    "-D", "clippy::complexity",
    "-D", "clippy::perf",
    "-D", "clippy::style",
    "-D", "clippy::correctness",

    # Restriction lints — prohibited patterns
    "-D", "clippy::unwrap_used",
    "-D", "clippy::expect_used",
    "-D", "clippy::panic",
    "-D", "clippy::todo",
    "-D", "clippy::unimplemented",
    "-D", "clippy::print_stdout",
    "-D", "clippy::print_stderr",

    # Documentation lints
    "-D", "missing_docs",
    "-D", "rustdoc::missing_crate_level_docs",
    "-D", "rustdoc::broken_intra_doc_links",
    "-W", "rustdoc::invalid_html_tags",
    "-W", "rustdoc::bare_urls",
]

[registries.crates-io]
protocol = "sparse"
